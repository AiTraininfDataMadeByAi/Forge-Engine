<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeEngine — 3D Game Engine</title>
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" href="css/panels.css">
<link rel="stylesheet" href="css/inspector.css">
<link rel="stylesheet" href="css/modal.css">
</head>
<body>
<div id="loading-screen">
  <h1>FORGE ENGINE</h1>
  <div class="bar"><div class="bar-fill" id="load-bar"></div></div>
  <p id="load-status" style="color:#888;font-size:12px;">Initializing...</p>
  <div id="load-error"></div>
</div>
<div id="app" style="display:none;">
  <div id="menubar">
    <div class="menu-logo">⚡ FORGE</div>
    <div class="menu-items">
      <div class="menu-item" data-menu="file">File</div>
      <div class="menu-item" data-menu="edit">Edit</div>
      <div class="menu-item" data-menu="view">View</div>
      <div class="menu-item" data-menu="gameobject">GameObject</div>
      <div class="menu-item" data-menu="tools">Tools</div>
      <div class="menu-item" data-menu="plugins">Plugins</div>
      <div class="menu-item" data-menu="help">Help</div>
    </div>
    <div class="menu-controls">
      <button id="btn-play" title="Play">▶</button>
      <button id="btn-pause" title="Pause" disabled>⏸</button>
      <button id="btn-stop" title="Stop" disabled>⏹</button>
    </div>
  </div>
  <div id="dropdown-menu" class="dropdown-menu" style="display:none;"></div>
  <div id="toolbar">
    <button class="tool-btn active" data-tool="select" title="Select (Q)"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 1l5 14 2-5 5-2L2 1z" fill="currentColor"/></svg></button>
    <button class="tool-btn" data-tool="move" title="Move (W)"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v14M1 8h14M8 1l-2 2h4L8 1zM8 15l-2-2h4l-2 2zM1 8l2-2v4L1 8zM15 8l-2-2v4l2-2z" stroke="currentColor" fill="none" stroke-width="1.2"/></svg></button>
    <button class="tool-btn" data-tool="rotate" title="Rotate (E)"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M12 4a6 6 0 1 0 .5 7" stroke="currentColor" fill="none" stroke-width="1.5"/><path d="M13 1v4h-4" stroke="currentColor" fill="none" stroke-width="1.5"/></svg></button>
    <button class="tool-btn" data-tool="scale" title="Scale (R)"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="1" width="5" height="5" fill="currentColor"/><rect x="10" y="10" width="5" height="5" fill="currentColor"/><path d="M6 3.5h7v7" stroke="currentColor" fill="none" stroke-width="1.2"/></svg></button>
    <div class="tool-sep"></div>
    <button class="tool-btn" data-tool="grid-toggle" title="Toggle Grid"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M0 4h16M0 8h16M0 12h16M4 0v16M8 0v16M12 0v16" stroke="currentColor" stroke-width="0.5" fill="none"/></svg></button>
    <button class="tool-btn" data-tool="snap-toggle" title="Toggle Snap"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 4h8v8H4z" stroke="currentColor" fill="none" stroke-width="1.2"/><circle cx="4" cy="4" r="1.5" fill="currentColor"/><circle cx="12" cy="4" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg></button>
  </div>
  <div id="editor-layout">
    <div id="panel-left" class="panel"><div class="panel-header"><span class="panel-title">Hierarchy</span><button class="panel-btn" id="hierarchy-add" title="Add GameObject">+</button></div><div class="panel-search"><input type="text" placeholder="Search..." id="hierarchy-search"></div><div class="panel-content" id="hierarchy-tree"></div></div>
    <div class="resize-handle" data-resize="left"></div>
    <div id="panel-center">
      <div id="viewport-container">
        <div id="viewport-header"><div class="viewport-tabs"><button class="vp-tab active" data-view="scene">Scene</button><button class="vp-tab" data-view="game">Game</button></div><div class="viewport-options"><select id="vp-shading"><option value="default">Shaded</option><option value="wireframe">Wireframe</option><option value="unlit">Unlit</option></select><select id="vp-camera"><option value="perspective">Perspective</option><option value="top">Top</option><option value="front">Front</option><option value="right">Right</option></select></div></div>
        <canvas id="viewport-canvas"></canvas>
        <div id="viewport-gizmo"></div>
        <div id="viewport-info"><span id="vp-fps">0 FPS</span><span id="vp-tris">0 tris</span><span id="vp-objects">0 objects</span></div>
      </div>
      <div class="resize-handle-h" data-resize="bottom"></div>
      <div id="panel-bottom" class="panel">
        <div class="panel-header"><div class="panel-tabs"><button class="p-tab active" data-tab="console">Console</button><button class="p-tab" data-tab="assets">Assets</button><button class="p-tab" data-tab="scripts">Scripts</button></div><div class="panel-actions"><button class="panel-btn" id="console-clear" title="Clear">🗑</button></div></div>
        <div class="panel-content tab-content" id="tab-console" style="display:block;"><div id="console-output"></div><div id="console-input-row"><span class="console-prompt">&gt;</span><input type="text" id="console-input" placeholder="Enter command..."></div></div>
        <div class="panel-content tab-content" id="tab-assets" style="display:none;"><div id="assets-toolbar"><button class="panel-btn" id="assets-import">Import</button><button class="panel-btn" id="assets-folder">New Folder</button><input type="file" id="assets-file-input" multiple style="display:none;"></div><div id="assets-grid"></div></div>
        <div class="panel-content tab-content" id="tab-scripts" style="display:none;"><div id="scripts-toolbar"><button class="panel-btn" id="scripts-new">New Script</button><select id="scripts-list"></select></div><div id="script-editor-container"></div></div>
      </div>
    </div>
    <div class="resize-handle" data-resize="right"></div>
    <div id="panel-right" class="panel"><div class="panel-header"><span class="panel-title">Inspector</span></div><div class="panel-content" id="inspector-content"><div class="inspector-empty">Select a GameObject</div></div></div>
  </div>
  <div id="statusbar"><span id="status-left">Ready</span><span id="status-right">ForgeEngine v0.1.0</span></div>
</div>
<div id="modal-overlay" style="display:none;"><div id="modal-container"><div id="modal-header"><span id="modal-title"></span><button id="modal-close">&times;</button></div><div id="modal-body"></div></div></div>
<div id="plugin-container" style="display:none;"></div>

<script src="js/core/utils.js"></script>
<script src="js/core/events.js"></script>
<script src="js/core/scene.js"></script>
<script src="js/core/renderer.js"></script>
<script src="js/core/input.js"></script>
<script src="js/core/assets.js"></script>
<script src="js/core/scripting.js"></script>
<script src="js/core/plugins.js"></script>
<script src="js/core/physics.js"></script>
<script src="js/editor/menubar.js"></script>
<script src="js/editor/hierarchy.js"></script>
<script src="js/editor/inspector.js"></script>
<script src="js/editor/viewport.js"></script>
<script src="js/editor/console.js"></script>
<script src="js/editor/assets-panel.js"></script>
<script src="js/editor/script-editor.js"></script>
<script src="js/editor/resize.js"></script>
<script src="js/editor/toolbar.js"></script>
<script src="js/editor/gizmos.js"></script>
<script src="js/core/app.js"></script>

</html>
